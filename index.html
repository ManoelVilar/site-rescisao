<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINHA RESCISÃO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <video autoplay muted loop id="video-fundo">
    <source src="vid.mp4" type="video/mp4">
    Seu navegador não suporta vídeos.
  </video>

  <header class="main-navbar">
    <div class="logo">
        <span class="icon"></span> <strong>MINHA RESCISÃO</strong>
    </div>
    <nav>  
        <a href="https://www.linkedin.com/in/manoelvilar/" target="_blank" class="btn-contato">Desenvolvedor</a>
    </nav>
</header>
  
  </body>
    

    

    <div class="form-container">
        <div class="campo">
            <label for="data-admissao">Data de Admissão:</label>
            <input type="date" id="data-admissao">
        </div>

        <div class="campo">
            <label for="data-saida">Data de Saída:</label>
            <input type="date" id="data-saida">
        </div>

        <div class="campo">
            <label for="motivo">Motivo da Rescisão:</label>
            <select id="motivo">
                <option value="sem-justa-causa">Demissão sem justa causa</option>
                <option value="com-justa-causa">Demissão com justa causa</option>
                <option value="pedido-demissao">Pedido de Demissão</option>
                <option value="acordo">Acordo entre as partes</option>
            </select>
        </div>

        <div class="campo">
            <label>Filhos menores de 14 anos:</label>
            <input type="number" id="filhos" min="0" value="0">
        </div>

        <div class="campo">
            <label>Salário Bruto Mensal:</label>
            <input placeholder="Ex: 1621.00" type="number" id="salario" step="0.01">
        </div>

        <div class="campo">
            <label>Possui férias vencidas?</label>
            <select id="ferias">
                <option value="0">Nenhuma</option>
                <option value="1">1 férias vencida</option>
                <option value="2">2 férias vencidas</option>
            </select>
        </div>

        <button onclick="calcular()">CALCULAR AGORA</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
    <div class="info-box">
        <h4>MINHA RECISÃO é uma ferramenta digital projetada para estimar os valores que um trabalhador deve receber ao encerrar um contrato de trabalho.</h4>
    </div>
</body>
</html>
